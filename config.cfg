/configure python python-script "my_script" admin-state enable
/configure python python-script "my_script" urls ["cf3:/my_script.py"]
/configure python python-script "my_script" version python3
/configure system grpc custom-proto "my_custom_proto" admin-state enable
/configure system grpc custom-proto "my_custom_proto" urls ["cf3:\my_custom_proto.protoc"]
/configure system grpc custom-proto "my_custom_proto" python-script "my_script"
/configure system security aaa local-profiles profile "administrative" grpc custom-proto permit
